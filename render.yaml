services:
  - type: web
    name: telegram-bot-gestion
    runtime: python
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        fromFile: true
        value: config.py  # O mejor: usa Render dashboard
      - key: ADMIN_ID
        fromFile: true
        value: config.py
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn bot_app:app --host 0.0.0.0 --port ${PORT}
    envVarsSecrets:
      - key: TELEGRAM_BOT_TOKEN
        secret: TELEGRAM_BOT_TOKEN
      - key: ADMIN_ID
        secret: ADMIN_ID
